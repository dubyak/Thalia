version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip3 install --target /app/deps -r backend/requirements.txt
run:
  command: bash -c "PYTHONPATH=/app/deps:$PYTHONPATH python3 -m uvicorn main:app --host 0.0.0.0 --port 8000 --app-dir backend"
  network:
    port: 8000
    env: PORT
